name: Release

# Build installers for each OS and publish them to a GitHub Release.
# Trigger by pushing a version tag, e.g. `git tag v0.1.0 && git push --tags`,
# or run manually from the Actions tab.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./apps/json-studio/src-tauri -> target"

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Code signing / notarization secrets go here when configured (see RELEASE.md):
          # APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD, APPLE_ID, APPLE_PASSWORD,
          # APPLE_TEAM_ID, TAURI_SIGNING_PRIVATE_KEY, TAURI_SIGNING_PRIVATE_KEY_PASSWORD
        with:
          projectPath: apps/json-studio
          tagName: ${{ github.ref_name }}
          releaseName: "JSON Studio ${{ github.ref_name }}"
          releaseBody: "See the assets below to download and install."
          # Keep the release as a draft until ALL matrix jobs (and the portable
          # zip) have uploaded their assets. The separate `publish` job below
          # flips it to published only after everything is attached. Required
          # because the repo uses immutable releases: once published a release is
          # frozen, so assets uploaded later would be rejected.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      # Build a portable Windows zip: the raw exe + a `portable.txt` marker so
      # the app keeps its settings in a `JSONStudioData` folder beside itself
      # instead of the user profile. Runs only for tag pushes on Windows.
      - name: Build portable Windows zip
        if: matrix.platform == 'windows-latest' && startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}".TrimStart("v")
          $base = "apps/json-studio/src-tauri/target/release"
          # Find the built app exe regardless of its exact name (Tauri 2 may name
          # it after the product, e.g. "JSON Studio.exe"). Exclude any installer.
          $exe = Get-ChildItem -Path $base -Filter *.exe -File -ErrorAction SilentlyContinue |
                 Where-Object { $_.Name -notmatch 'setup' } | Select-Object -First 1
          if (-not $exe) { throw "no app .exe found in $base" }
          Write-Host "Using binary: $($exe.FullName)"
          $stage = "portable/JSON Studio"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item $exe.FullName (Join-Path $stage "JSON Studio.exe")
          # Marker that switches the app into portable mode at runtime.
          New-Item -ItemType File -Force -Path (Join-Path $stage "portable.txt") | Out-Null
          $readme = @(
            "JSON Studio $ver - Portable",
            "",
            "Run 'JSON Studio.exe'. Settings, recent files and session are stored in the",
            "'JSONStudioData' folder next to the executable, so nothing is written to the",
            "registry or your user profile.",
            "",
            "Requires the Microsoft Edge WebView2 runtime (preinstalled on Windows 10/11):",
            "https://developer.microsoft.com/microsoft-edge/webview2/"
          )
          Set-Content -Path (Join-Path $stage "README.txt") -Value $readme -Encoding UTF8
          $zip = "JSON-Studio-$ver-portable-x64.zip"
          Compress-Archive -Path "portable/*" -DestinationPath $zip -Force
          "PORTABLE_ZIP=$zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      # Upload into the existing draft release (created by tauri-action above)
      # without changing its draft state. The `publish` job below publishes it.
      - name: Upload portable zip to draft release
        if: matrix.platform == 'windows-latest' && startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" "$env:PORTABLE_ZIP" --clobber

  # Publish the draft release only after ALL build jobs (installers + portable
  # zip) have finished and attached their assets. This removes any timing race:
  # the release is frozen (immutable) only once it is complete.
  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ github.ref_name }}" --repo "${{ github.repository }}" --draft=false --latest
