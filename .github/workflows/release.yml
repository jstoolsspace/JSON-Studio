name: Release

# Build installers for each OS and publish them to a GitHub Release.
# Trigger by pushing a version tag, e.g. `git tag v0.1.0 && git push --tags`,
# or run manually from the Actions tab.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./apps/json-studio/src-tauri -> target"

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Code signing / notarization secrets go here when configured (see RELEASE.md):
          # APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD, APPLE_ID, APPLE_PASSWORD,
          # APPLE_TEAM_ID, TAURI_SIGNING_PRIVATE_KEY, TAURI_SIGNING_PRIVATE_KEY_PASSWORD
        with:
          projectPath: apps/json-studio
          tagName: ${{ github.ref_name }}
          releaseName: "JSON Studio ${{ github.ref_name }}"
          releaseBody: "See the assets below to download and install."
          # Publish immediately so the release is public as soon as the build
          # finishes. Set back to true if you'd rather review a draft first.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      # Build a portable Windows zip: the raw exe + a `portable.txt` marker so
      # the app keeps its settings in a `JSONStudioData` folder beside itself
      # instead of the user profile. Runs only for tag pushes on Windows.
      - name: Build portable Windows zip
        if: matrix.platform == 'windows-latest' && startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $ver = $tag.TrimStart("v")
          $exe = "apps/json-studio/src-tauri/target/release/json-studio.exe"
          if (-not (Test-Path $exe)) { throw "binary not found at $exe" }
          $stage = "portable/JSON Studio"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item $exe (Join-Path $stage "JSON Studio.exe")
          # Marker that switches the app into portable mode at runtime.
          New-Item -ItemType File -Force -Path (Join-Path $stage "portable.txt") | Out-Null
          @"
          JSON Studio $ver - Portable

          Run "JSON Studio.exe". Settings, recent files and session are stored in
          the "JSONStudioData" folder next to the executable (created on first run),
          so nothing is written to the registry or your user profile.

          Requires the Microsoft Edge WebView2 runtime, which is preinstalled on
          Windows 10/11. If missing, get it from:
          https://developer.microsoft.com/microsoft-edge/webview2/
          "@ | Set-Content -Path (Join-Path $stage "README.txt") -Encoding UTF8
          $zip = "JSON-Studio-$ver-portable-x64.zip"
          Compress-Archive -Path "portable/*" -DestinationPath $zip -Force
          echo "PORTABLE_ZIP=$zip" >> $env:GITHUB_ENV

      - name: Upload portable zip to release
        if: matrix.platform == 'windows-latest' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ env.PORTABLE_ZIP }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
